<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SAKTY - Kas Yayasan</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f1f5f9; /* slate-100 */
            -webkit-tap-highlight-color: transparent;
        }
        
        /* Mobile Container Layout */
        .app-container {
            max-width: 480px;
            margin: 0 auto;
            background-color: #ffffff;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            box-shadow: 0 0 20px rgba(0,0,0,0.05);
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Smooth Transitions */
        .view-section {
            display: none;
            opacity: 0;
            transition: opacity 0.3s ease-in-out, transform 0.3s ease-in-out;
            transform: translateY(10px);
            flex: 1;
            overflow-y: auto;
            padding-bottom: 80px; /* Space for bottom nav */
        }
        
        .view-section.active {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

        /* Bottom Nav Styling */
        .bottom-nav {
            position: absolute;
            bottom: 0;
            width: 100%;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-top: 1px solid #e2e8f0;
            padding-bottom: env(safe-area-inset-bottom); /* For iPhone notch */
        }

        .nav-item {
            color: #94a3b8;
            transition: all 0.2s ease;
        }
        .nav-item.active {
            color: #059669; /* emerald-600 */
        }
        .nav-item.active i {
            transform: translateY(-2px);
            color: #059669;
        }

        /* Card styles */
        .glass-card {
            background: linear-gradient(135deg, #059669 0%, #10b981 100%);
            color: white;
            box-shadow: 0 10px 25px -5px rgba(16, 185, 129, 0.4);
        }
        
        .transaction-card {
            transition: transform 0.2s;
        }
        .transaction-card:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body class="text-slate-800 antialiased selection:bg-emerald-200 selection:text-emerald-900">

    <div class="app-container">
        
        <div id="login-view" class="flex flex-col items-center justify-center min-h-screen p-6 bg-slate-50 absolute inset-0 z-50 transition-opacity duration-500">
            <div class="w-full max-w-sm space-y-8 bg-white p-8 rounded-3xl shadow-xl">
                <div class="text-center">
                    <div class="w-20 h-20 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <i class="ph ph-mosque text-4xl text-emerald-600"></i>
                    </div>
                    <h1 class="text-2xl font-bold text-slate-800">SAKTY</h1>
                    <p class="text-xs text-slate-500 mt-1">Sistem Akuntansi Kas Terpadu Yayasan<br>Ponpes Salafiyah Abu-Zairi</p>
                </div>

                <form id="login-form" class="space-y-6">
                    <div>
                        <label class="block text-sm font-medium text-slate-700 mb-2">Kode Akses / Password</label>
                        <div class="relative">
                            <input type="password" id="password-input" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all" placeholder="Masukkan password" required>
                            <i class="ph ph-lock-key absolute right-4 top-3.5 text-xl text-slate-400"></i>
                        </div>
                    </div>
                    <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-emerald-200 transition-all active:scale-95">
                        Masuk Sistem
                    </button>
                </form>
            </div>
        </div>

        <header id="app-header" class="hidden flex justify-between items-center px-6 py-4 bg-white sticky top-0 z-40">
            <div>
                <h2 class="text-lg font-bold text-slate-800 tracking-tight">SAKTY</h2>
                <p class="text-[10px] text-slate-500 font-medium">Ponpes Salafiyah Abu-Zairi</p>
            </div>
            <button onclick="logout()" class="w-10 h-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-600 hover:bg-red-50 hover:text-red-500 transition-colors">
                <i class="ph ph-sign-out text-xl"></i>
            </button>
        </header>

        <main id="view-home" class="view-section px-6 pt-2">
            <!-- Saldo Card -->
            <div class="glass-card rounded-3xl p-6 mb-8 relative overflow-hidden">
                <div class="absolute top-0 right-0 opacity-10">
                    <i class="ph ph-coins text-9xl -mt-4 -mr-4"></i>
                </div>
                <h3 class="text-emerald-50 font-medium text-sm mb-1 opacity-90">Total Saldo Kas</h3>
                <h1 class="text-4xl font-bold tracking-tight mb-4" id="total-balance">Rp 0</h1>
                
                <div class="flex gap-4 pt-4 border-t border-emerald-500/30">
                    <div class="flex-1">
                        <p class="text-xs text-emerald-100 mb-1">Pemasukan Bulan Ini</p>
                        <p class="text-sm font-semibold" id="monthly-income">Rp 0</p>
                    </div>
                    <div class="flex-1">
                        <p class="text-xs text-emerald-100 mb-1">Pengeluaran Bulan Ini</p>
                        <p class="text-sm font-semibold" id="monthly-expense">Rp 0</p>
                    </div>
                </div>
            </div>

            <!-- Recent Transactions -->
            <div class="flex justify-between items-end mb-4">
                <h3 class="font-bold text-slate-800 text-lg">Transaksi Terakhir</h3>
                <button onclick="switchView('reports')" class="text-xs text-emerald-600 font-medium hover:underline">Lihat Semua</button>
            </div>
            
            <div id="recent-transactions-list" class="space-y-3 pb-4">
                <!-- Data akan di-render di sini -->
            </div>
        </main>

        <main id="view-add" class="view-section px-6 pt-2">
            <h2 class="text-2xl font-bold text-slate-800 mb-6">Tambah Transaksi</h2>
            
            <form id="transaction-form" class="space-y-5">
                <!-- Jenis Transaksi (Toggle) -->
                <div class="bg-slate-100 p-1 rounded-xl flex">
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="type" value="masuk" class="peer sr-only" checked>
                        <div class="text-center py-2 rounded-lg text-sm font-medium transition-all peer-checked:bg-white peer-checked:text-emerald-600 peer-checked:shadow-sm text-slate-500">
                            Pemasukan
                        </div>
                    </label>
                    <label class="flex-1 cursor-pointer">
                        <input type="radio" name="type" value="keluar" class="peer sr-only">
                        <div class="text-center py-2 rounded-lg text-sm font-medium transition-all peer-checked:bg-white peer-checked:text-red-600 peer-checked:shadow-sm text-slate-500">
                            Pengeluaran
                        </div>
                    </label>
                </div>

                <!-- Nominal -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Nominal (Rp)</label>
                    <div class="relative">
                        <span class="absolute left-4 top-3.5 text-slate-500 font-medium">Rp</span>
                        <input type="number" id="tx-amount" class="w-full pl-12 pr-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all" placeholder="0" required>
                    </div>
                </div>

                <!-- Tanggal -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Tanggal</label>
                    <input type="date" id="tx-date" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all" required>
                </div>

                <!-- Keterangan -->
                <div>
                    <label class="block text-sm font-medium text-slate-700 mb-2">Keterangan / Deskripsi</label>
                    <textarea id="tx-desc" rows="3" class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:outline-none focus:ring-2 focus:ring-emerald-500 focus:border-transparent transition-all" placeholder="Contoh: Infaq donatur hamba Allah" required></textarea>
                </div>

                <button type="submit" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-semibold py-3 rounded-xl shadow-lg shadow-emerald-200 transition-all active:scale-95 mt-4">
                    Simpan Data
                </button>
            </form>
        </main>

        <main id="view-reports" class="view-section px-6 pt-2">
            <h2 class="text-2xl font-bold text-slate-800 mb-4">Laporan Kas</h2>
            
            <!-- Tabs Laporan -->
            <div class="flex gap-4 border-b border-slate-200 mb-6">
                <button onclick="setReportTab('monthly')" id="tab-monthly" class="pb-3 text-sm font-medium border-b-2 border-emerald-600 text-emerald-600 transition-colors">Rekap Bulanan</button>
                <button onclick="setReportTab('yearly')" id="tab-yearly" class="pb-3 text-sm font-medium border-b-2 border-transparent text-slate-500 hover:text-slate-700 transition-colors">Rekap Tahunan</button>
            </div>

            <!-- Konten Laporan -->
            <div id="report-content" class="bg-white rounded-2xl border border-slate-100 shadow-sm overflow-hidden">
                <!-- Tabel akan di generate JS -->
            </div>
            
            <button onclick="exportToCSV()" class="mt-6 w-full flex items-center justify-center gap-2 bg-slate-800 hover:bg-slate-900 text-white font-medium py-3 rounded-xl transition-all active:scale-95">
                <i class="ph ph-download-simple text-lg"></i>
                Download Data (CSV)
            </button>
        </main>

        <nav id="bottom-nav" class="hidden bottom-nav z-40">
            <div class="flex justify-around items-center pt-3 pb-2 px-2">
                <button onclick="switchView('home')" id="nav-home" class="nav-item active flex flex-col items-center w-16 gap-1">
                    <i class="ph-fill ph-house text-2xl transition-transform duration-300"></i>
                    <span class="text-[10px] font-medium">Beranda</span>
                </button>
                
                <button onclick="switchView('add')" id="nav-add" class="nav-item flex flex-col items-center w-16 gap-1 -mt-6 relative">
                    <div class="bg-emerald-600 text-white p-3 rounded-full shadow-lg shadow-emerald-200 border-4 border-white transition-transform duration-300 hover:scale-105 active:scale-95">
                        <i class="ph-bold ph-plus text-xl"></i>
                    </div>
                    <span class="text-[10px] font-medium text-slate-500">Tambah</span>
                </button>

                <button onclick="switchView('reports')" id="nav-reports" class="nav-item flex flex-col items-center w-16 gap-1">
                    <i class="ph-fill ph-chart-bar text-2xl transition-transform duration-300"></i>
                    <span class="text-[10px] font-medium">Laporan</span>
                </button>

                <a href="https://drive.google.com/drive/folders/1NUnSmL5_Xyt7rQuTgw0Zx-V6Zjvhovgf?usp=drive_link" target="_blank" class="nav-item flex flex-col items-center w-16 gap-1 text-slate-400 hover:text-blue-500 transition-colors">
                    <i class="ph-fill ph-google-drive-logo text-2xl"></i>
                    <span class="text-[10px] font-medium">Drive</span>
                </a>
            </div>
        </nav>

    </div>

    <script>
        /**
         * KONFIGURASI SUPABASE
         * Ganti URL dan KEY dengan kredensial dari project Supabase Anda.
         */
        const SUPABASE_URL = 'https://dkcmthggilaplyxvhnpp.supabase.co'; // Ganti dengan URL Supabase
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRrY210aGdnaWxhcGx5eHZobnBwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ2MTc5MTgsImV4cCI6MjEwMDE5MzkxOH0.TpSIk3T4I6r-SBC7Uqlwq8-VOf3IslSjWxx681r-tpI'; // Ganti dengan Anon Key Supabase
        
        let supabaseClient = null;
        let isDemoMode = false;

        // Cek jika kredensial belum diisi, gunakan Demo Mode (LocalStorage)
        if (SUPABASE_URL === 'YOUR_SUPABASE_URL') {
            isDemoMode = true;
            console.log("Menjalankan Demo Mode (LocalStorage) karena kredensial Supabase belum diatur.");
        } else {
            supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        }

        // Variabel State
        let transactions = [];
        const CUSTOM_PASSWORD = "salafiyahjaya"; // Password standar untuk masuk (bisa diganti)
        let currentReportMode = 'monthly';

        // Inisialisasi Aplikasi
        document.addEventListener('DOMContentLoaded', () => {
            // Set default date to today
            document.getElementById('tx-date').valueAsDate = new Date();
            
            // Cek Session
            if(sessionStorage.getItem('sakty_logged_in') === 'true') {
                showApp();
            }

            // Event Listeners
            document.getElementById('login-form').addEventListener('submit', handleLogin);
            document.getElementById('transaction-form').addEventListener('submit', handleAddTransaction);
        });

        /* --- FUNGSI AUTH --- */
        function handleLogin(e) {
            e.preventDefault();
            const input = document.getElementById('password-input').value;
            
            if (input === CUSTOM_PASSWORD) {
                sessionStorage.setItem('sakty_logged_in', 'true');
                document.getElementById('password-input').value = '';
                showApp();
            } else {
                Swal.fire({
                    icon: 'error',
                    title: 'Akses Ditolak',
                    text: 'Password yang Anda masukkan salah.',
                    confirmButtonColor: '#059669',
                    customClass: { popup: 'rounded-3xl' }
                });
            }
        }

        function logout() {
            sessionStorage.removeItem('sakty_logged_in');
            document.getElementById('app-header').classList.add('hidden');
            document.getElementById('bottom-nav').classList.add('hidden');
            document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
            
            const loginView = document.getElementById('login-view');
            loginView.style.display = 'flex';
            setTimeout(() => loginView.style.opacity = '1', 10);
        }

        function showApp() {
            const loginView = document.getElementById('login-view');
            loginView.style.opacity = '0';
            
            setTimeout(() => {
                loginView.style.display = 'none';
                document.getElementById('app-header').classList.remove('hidden');
                document.getElementById('bottom-nav').classList.remove('hidden');
                
                loadData(); // Load data saat masuk
                switchView('home');
            }, 300);
        }

        /* --- LOGIKA NAVIGASI --- */
        function switchView(viewId) {
            // Update Active Nav Icon
            document.querySelectorAll('.nav-item').forEach(el => {
                if(el.id !== 'nav-add') { // Pengecualian styling tombol tambah
                    el.classList.remove('active');
                    el.querySelector('i').classList.replace('ph-fill', 'ph');
                }
            });
            
            if(viewId !== 'add') {
                const activeNav = document.getElementById(`nav-${viewId}`);
                if(activeNav) {
                    activeNav.classList.add('active');
                    activeNav.querySelector('i').classList.replace('ph', 'ph-fill');
                }
            }

            // Animate Views
            document.querySelectorAll('.view-section').forEach(el => {
                el.classList.remove('active');
                setTimeout(() => el.style.display = 'none', 300); // Wait for transition
            });

            const activeView = document.getElementById(`view-${viewId}`);
            setTimeout(() => {
                activeView.style.display = 'block';
                // Trigger reflow
                void activeView.offsetWidth; 
                activeView.classList.add('active');
            }, 310);

            if(viewId === 'home') renderHome();
            if(viewId === 'reports') renderReports();
        }

        /* --- FUNGSI CRUD & DATABASE --- */
        async function loadData() {
            if (isDemoMode) {
                const stored = localStorage.getItem('sakty_data');
                if (stored) {
                    transactions = JSON.parse(stored);
                } else {
                    // Seed dummy data
                    transactions = [
                        { id: 1, type: 'masuk', amount: 5000000, description: 'Saldo Awal Yayasan', date: new Date().toISOString(), created_at: new Date().toISOString() }
                    ];
                    saveLocalData();
                }
            } else {
                try {
                    const { data, error } = await supabaseClient
                        .from('transactions')
                        .select('*')
                        .order('date', { ascending: false });
                        
                    if (error) throw error;
                    transactions = data || [];
                } catch (error) {
                    Swal.fire('Error', 'Gagal memuat data dari database.', 'error');
                }
            }
            renderHome();
        }

        function saveLocalData() {
            localStorage.setItem('sakty_data', JSON.stringify(transactions));
        }

        async function handleAddTransaction(e) {
            e.preventDefault();
            
            const type = document.querySelector('input[name="type"]:checked').value;
            const amount = parseFloat(document.getElementById('tx-amount').value);
            const date = document.getElementById('tx-date').value;
            const desc = document.getElementById('tx-desc').value;

            if(!amount || !date || !desc) return;

            const newTx = {
                id: isDemoMode ? Date.now() : undefined, // Supabase generates ID if undefined
                type: type,
                amount: amount,
                description: desc,
                date: date,
                created_at: new Date().toISOString()
            };

            // Loading state
            Swal.fire({ title: 'Menyimpan...', allowOutsideClick: false, didOpen: () => { Swal.showLoading() } });

            if (isDemoMode) {
                transactions.unshift(newTx);
                saveLocalData();
                finishAdd();
            } else {
                try {
                    const { data, error } = await supabaseClient.from('transactions').insert([newTx]).select();
                    if (error) throw error;
                    transactions.unshift(data[0]); // Add to local array
                    finishAdd();
                } catch (error) {
                    Swal.fire('Error', 'Gagal menyimpan transaksi.', 'error');
                }
            }
        }

        function finishAdd() {
            Swal.fire({
                icon: 'success',
                title: 'Berhasil',
                text: 'Data telah disimpan.',
                timer: 1500,
                showConfirmButton: false,
                customClass: { popup: 'rounded-3xl' }
            });
            
            document.getElementById('transaction-form').reset();
            document.getElementById('tx-date').valueAsDate = new Date();
            switchView('home');
        }

        async function deleteTransaction(id) {
            const confirm = await Swal.fire({
                title: 'Hapus Transaksi?',
                text: "Data ini tidak dapat dikembalikan!",
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#ef4444',
                cancelButtonColor: '#94a3b8',
                confirmButtonText: 'Ya, Hapus',
                cancelButtonText: 'Batal',
                customClass: { popup: 'rounded-3xl' }
            });

            if (confirm.isConfirmed) {
                if (isDemoMode) {
                    transactions = transactions.filter(t => t.id !== id);
                    saveLocalData();
                    renderHome();
                } else {
                    try {
                        const { error } = await supabaseClient.from('transactions').delete().eq('id', id);
                        if (error) throw error;
                        transactions = transactions.filter(t => t.id !== id);
                        renderHome();
                        if(document.getElementById('view-reports').classList.contains('active')){
                            renderReports();
                        }
                    } catch (error) {
                        Swal.fire('Error', 'Gagal menghapus data.', 'error');
                    }
                }
            }
        }

        /* --- FUNGSI RENDER UI & FORMATTING --- */
        const formatRp = (num) => {
            return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', maximumFractionDigits: 0 }).format(num);
        };

        const formatDate = (dateStr) => {
            const date = new Date(dateStr);
            return new Intl.DateTimeFormat('id-ID', { day: 'numeric', month: 'short', year: 'numeric' }).format(date);
        };

        function renderHome() {
            let totalMasuk = 0;
            let totalKeluar = 0;
            
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();
            let monthMasuk = 0;
            let monthKeluar = 0;

            const listEl = document.getElementById('recent-transactions-list');
            listEl.innerHTML = '';

            // Hitung total dan render 5 data terakhir
            transactions.forEach((tx, index) => {
                const txDate = new Date(tx.date);
                
                if (tx.type === 'masuk') {
                    totalMasuk += tx.amount;
                    if(txDate.getMonth() === currentMonth && txDate.getFullYear() === currentYear) monthMasuk += tx.amount;
                } else {
                    totalKeluar += tx.amount;
                    if(txDate.getMonth() === currentMonth && txDate.getFullYear() === currentYear) monthKeluar += tx.amount;
                }

                if (index < 5) {
                    const isMasuk = tx.type === 'masuk';
                    const icon = isMasuk ? 'ph-arrow-down-left text-emerald-500 bg-emerald-50' : 'ph-arrow-up-right text-red-500 bg-red-50';
                    const sign = isMasuk ? '+' : '-';
                    const color = isMasuk ? 'text-emerald-600' : 'text-slate-800';

                    const item = document.createElement('div');
                    item.className = 'transaction-card bg-white p-4 rounded-2xl shadow-sm border border-slate-100 flex items-center justify-between gap-3';
                    item.innerHTML = `
                        <div class="flex items-center gap-3 overflow-hidden">
                            <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 ${icon.split(' ')[2]}">
                                <i class="ph-bold ${icon.split(' ')[0]} text-lg ${icon.split(' ')[1]}"></i>
                            </div>
                            <div class="truncate">
                                <p class="text-sm font-semibold text-slate-800 truncate">${tx.description}</p>
                                <p class="text-[11px] text-slate-400">${formatDate(tx.date)}</p>
                            </div>
                        </div>
                        <div class="text-right shrink-0 flex flex-col items-end">
                            <p class="text-sm font-bold ${color}">${sign}${formatRp(tx.amount).replace('Rp', '')}</p>
                            <button onclick="deleteTransaction(${tx.id})" class="text-[10px] text-red-400 hover:text-red-600 mt-1"><i class="ph-fill ph-trash"></i> Hapus</button>
                        </div>
                    `;
                    listEl.appendChild(item);
                }
            });

            if(transactions.length === 0) {
                listEl.innerHTML = `<div class="text-center py-6 text-sm text-slate-400">Belum ada transaksi.</div>`;
            }

            document.getElementById('total-balance').innerText = formatRp(totalMasuk - totalKeluar);
            document.getElementById('monthly-income').innerText = formatRp(monthMasuk);
            document.getElementById('monthly-expense').innerText = formatRp(monthKeluar);
        }

        /* --- FUNGSI REKAP / LAPORAN --- */
        function setReportTab(mode) {
            currentReportMode = mode;
            if(mode === 'monthly') {
                document.getElementById('tab-monthly').classList.add('border-emerald-600', 'text-emerald-600');
                document.getElementById('tab-monthly').classList.remove('border-transparent', 'text-slate-500');
                document.getElementById('tab-yearly').classList.add('border-transparent', 'text-slate-500');
                document.getElementById('tab-yearly').classList.remove('border-emerald-600', 'text-emerald-600');
            } else {
                document.getElementById('tab-yearly').classList.add('border-emerald-600', 'text-emerald-600');
                document.getElementById('tab-yearly').classList.remove('border-transparent', 'text-slate-500');
                document.getElementById('tab-monthly').classList.add('border-transparent', 'text-slate-500');
                document.getElementById('tab-monthly').classList.remove('border-emerald-600', 'text-emerald-600');
            }
            renderReports();
        }

        function renderReports() {
            const container = document.getElementById('report-content');
            let groupedData = {};

            transactions.forEach(tx => {
                const d = new Date(tx.date);
                let key = '';
                let label = '';
                
                if (currentReportMode === 'monthly') {
                    key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; // YYYY-MM
                    label = new Intl.DateTimeFormat('id-ID', { month: 'long', year: 'numeric' }).format(d);
                } else {
                    key = `${d.getFullYear()}`; // YYYY
                    label = `Tahun ${d.getFullYear()}`;
                }

                if (!groupedData[key]) {
                    groupedData[key] = { label: label, masuk: 0, keluar: 0 };
                }
                
                if (tx.type === 'masuk') groupedData[key].masuk += tx.amount;
                if (tx.type === 'keluar') groupedData[key].keluar += tx.amount;
            });

            // Urutkan key dari terbaru
            const sortedKeys = Object.keys(groupedData).sort().reverse();
            
            let html = `
                <table class="w-full text-left text-sm text-slate-600">
                    <thead class="bg-slate-50 text-slate-500 border-b border-slate-100">
                        <tr>
                            <th class="px-4 py-3 font-medium">Periode</th>
                            <th class="px-4 py-3 font-medium text-right">Pemasukan</th>
                            <th class="px-4 py-3 font-medium text-right">Pengeluaran</th>
                            <th class="px-4 py-3 font-medium text-right text-emerald-600">Saldo</th>
                        </tr>
                    </thead>
                    <tbody class="divide-y divide-slate-100">
            `;

            if(sortedKeys.length === 0) {
                html += `<tr><td colspan="4" class="px-4 py-8 text-center text-slate-400">Belum ada data laporan.</td></tr>`;
            } else {
                sortedKeys.forEach(k => {
                    const row = groupedData[k];
                    const saldo = row.masuk - row.keluar;
                    html += `
                        <tr class="hover:bg-slate-50 transition-colors">
                            <td class="px-4 py-3 font-medium text-slate-700">${row.label}</td>
                            <td class="px-4 py-3 text-right text-emerald-600">${formatRp(row.masuk).replace('Rp','')}</td>
                            <td class="px-4 py-3 text-right text-red-500">${formatRp(row.keluar).replace('Rp','')}</td>
                            <td class="px-4 py-3 text-right font-bold text-slate-800">${formatRp(saldo).replace('Rp','')}</td>
                        </tr>
                    `;
                });
            }

            html += `</tbody></table>`;
            container.innerHTML = html;
        }

        function exportToCSV() {
            if(transactions.length === 0) {
                Swal.fire('Info', 'Tidak ada data untuk didownload', 'info');
                return;
            }
            
            const headers = ['ID', 'Tanggal', 'Jenis', 'Nominal', 'Keterangan'];
            const rows = transactions.map(t => 
                `${t.id},"${t.date}","${t.type}",${t.amount},"${t.description}"`
            );
            
            const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows].join("\n");
            const encodedUri = encodeURI(csvContent);
            
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `Laporan_SAKTY_${new Date().getTime()}.csv`);
            document.body.appendChild(link);
            
            link.click();
            document.body.removeChild(link);
            
            Swal.fire('Berhasil', 'File CSV berhasil diunduh. Anda bisa menguploadnya ke Google Drive (Spreadsheet).', 'success');
        }

    </script>
</body>
</html>
